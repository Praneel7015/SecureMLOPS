<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureML Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="settings-wrap">
    <div class="settings-card">
        <div class="settings-head">
            <a class="btn-ghost" href="{{ url_for('index') }}">Back to Dashboard</a>
            <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>

        <p class="eyebrow">Settings</p>
        <h1 class="settings-title">Account and Session</h1>
        <p class="settings-sub">Use this page to manage your authenticated session and safely sign out.</p>

        <div class="settings-grid">
            <div class="detail-cell">
                <span class="detail-key">Signed In As</span>
                <span class="detail-val mono">{{ username }}</span>
            </div>
            <div class="detail-cell">
                <span class="detail-key">Session Status</span>
                <span class="detail-val">Authenticated</span>
            </div>
        </div>

        <form action="{{ url_for('logout') }}" method="post" class="settings-actions">
            <button class="btn-primary" type="submit">Sign out</button>
        </form>
    </div>
</div>

<script>
(function () {
    const html = document.documentElement;
    const saved = localStorage.getItem('sml-theme');
    if (saved) html.setAttribute('data-theme', saved);

    const toggle = document.getElementById('themeToggle');
    if (!toggle) return;

    toggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('sml-theme', next);
    });
})();
</script>
</body>
</html>
